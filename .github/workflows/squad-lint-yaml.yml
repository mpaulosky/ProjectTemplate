name: lint-yaml
# Validates all workflow and config YAML files
# This workflow emits the required `yamllint` status check on push to dev.
# Also supports workflow_dispatch for manual triggering on branches without YAML changes.

on:
  push:
    branches: [dev]
    paths: ['**/*.yml', '**/*.yaml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-yaml:
    name: lint-yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            ignore: |
              .squad/
            rules:
              line-length:
                max: 200
                allow-non-breakable-inline-mappings: true
              truthy:
                allowed-values: ['true', 'false', 'on']
              brackets:
                min-spaces-inside: 0
                max-spaces-inside: 1
