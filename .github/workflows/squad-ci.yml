name: Squad CI
# Runs on PR to main branch — mirrors pre-push gate (build only, no tests)

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        default: "ProjectName"
  workflow_call:
    inputs:
      project_name:
        description: "Solution name without .slnx"
        required: false
        type: string
        default: "ProjectName"

permissions:
  contents: read

env:
  SOLUTION_NAME: ${{ inputs.project_name || 'ProjectName' }}.slnx

jobs:
  build:
    name: build (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_NAME }}

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION_NAME }} --configuration Release --no-restore
